<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lector Pro con Modal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; background-color: #f4f4f9; }
        #camera { width: 100%; max-width: 500px; height: 350px; border: 5px solid #333; border-radius: 10px; margin: 20px auto; overflow: hidden; position: relative; }
        video { width: 100%; height: auto; }
        
        /* Estilos del Modal (Ventana Emergente) */
        #modal {
            display: none; /* Oculto por defecto */
            position: fixed;
            z-index: 100;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            max-width: 80%;
        }
        button {
            background-color: #007bff;
            color: white; border: none;
            padding: 10px 20px; border-radius: 5px;
            cursor: pointer; font-size: 1rem; margin-top: 15px;
        }
        h2 { color: #333; }
        #codigo-leido { font-size: 2rem; color: #007bff; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

    <h1>Escáner de Productos</h1>
    <div id="camera"></div>
    <p>Apunta al código de barras para detectarlo.</p>

    <div id="modal">
        <div class="modal-content">
            <h2>¡Código Detectado!</h2>
            <div id="codigo-leido">--------</div>
            <button onclick="cerrarModal()">Escanear otro</button>
        </div>
    </div>

    <script>
        // Configuración de Quagga
        Quagga.init({
            inputStream: {
                name: "Live",
                type: "LiveStream",
                target: document.querySelector('#camera'),
                constraints: { facingMode: "environment" }
            },
            decoder: {
                readers: ["code_128_reader", "ean_reader", "ean_8_reader", "upc_reader"]
            }
        }, function(err) {
            if (err) { console.error(err); return; }
            Quagga.start();
        });

        // Al detectar un código
        Quagga.onDetected(function(data) {
            const code = data.codeResult.code;
            
            // Mostramos el código en el modal
            document.getElementById('codigo-leido').innerText = code;
            document.getElementById('modal').style.display = "flex";
            
            // Pausamos Quagga para que no siga escaneando el mismo código mil veces
            Quagga.pause(); 
            
            // Feedback vibratorio (solo en Android/Chrome)
            if (navigator.vibrate) navigator.vibrate(200);
        });

        function cerrarModal() {
            document.getElementById('modal').style.display = "none";
            // Reanudamos la cámara
            Quagga.resume();
        }
    </script>
</body>
</html>
